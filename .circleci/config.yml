version: 2.1

parameters:
  debian_release:
    type: string
    default: "trixie"
  boot_mode:
    type: enum
    enum: ["bios", "bios-uefi"]
    default: "bios"

jobs:
  build-debian-btrfs-image:
    machine:
      image: ubuntu-2204:current
      resource_class: medium
    parameters:
      debian_release:
        type: string
      boot_mode:
        type: enum
        enum: ["bios", "bios-uefi"]
    steps:
      - checkout

      - run:
          name: 安装基础工具
          command: |
            set -euo pipefail
            sudo tee /usr/sbin/policy-rc.d > /dev/null \<<'EOF'
            #!/bin/sh
            exit 101
            EOF
            sudo chmod +x /usr/sbin/policy-rc.d
            export DEBIAN_FRONTEND=noninteractive APT_LISTCHANGES_FRONTEND=none
            sudo apt update
            sudo apt install -y debootstrap btrfs-progs qemu-utils util-linux curl rsync parted kpartx
            chmod +x .circleci/scripts/disk-utils.sh

      - run:
          name: debootstrap -> chroot 系统配置
          command: |
            set -euo pipefail
            RELEASE=<< parameters.debian_release >>
            BOOT_MODE=<< parameters.boot_mode >>
            DEBOOT_DIR=/tmp/debootstrap-root
            sudo rm -rf "$DEBOOT_DIR"
            sudo mkdir -p "$DEBOOT_DIR"
            sudo debootstrap --arch=amd64 --variant=minbase "$RELEASE" "$DEBOOT_DIR" https://deb.debian.org/debian
            sudo cp /etc/resolv.conf "$DEBOOT_DIR/etc/resolv.conf"
            for fs in proc sys dev; do sudo mount --bind "/$fs" "$DEBOOT_DIR/$fs"; done
            sudo tee "$DEBOOT_DIR/usr/sbin/policy-rc.d" > /dev/null \<<'EOF'
            #!/bin/sh
            exit 101
            EOF
            sudo chmod +x "$DEBOOT_DIR/usr/sbin/policy-rc.d"

            # 根据 boot_mode 生成包列表
            if [ "$BOOT_MODE" = "bios-uefi" ]; then
              GRUB_PKGS="grub-efi-amd64 grub-efi-amd64-bin grub-pc-bin efibootmgr dosfstools"
              EXTRA_PKGS=""
            else
              GRUB_PKGS="grub-pc grub-pc-bin"
              EXTRA_PKGS=""
            fi

            # 将包列表作为环境变量传入 chroot
            sudo chroot "$DEBOOT_DIR" /bin/bash -c "export GRUB_PKGS='$GRUB_PKGS'; export EXTRA_PKGS='$EXTRA_PKGS'; $(cat \<<'CHROOT_SCRIPT'
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive APT_LISTCHANGES_FRONTEND=none
            
            apt-get update
            apt-get -y -o DPkg::Options::='--force-confdef' -o DPkg::Options::='--force-confold' install \
              cloud-init openssh-server locales tzdata linux-image-cloud-amd64 initramfs-tools \
              btrfs-progs btrfs-compsize haveged unattended-upgrades dbus \
              wget htop curl iproute2 net-tools ifupdown isc-dhcp-client python3-requests ca-certificates dialog perl-modules \
              $GRUB_PKGS $EXTRA_PKGS

            # 配置时区
            ln -sf /usr/share/zoneinfo/Asia/Hong_Kong /etc/localtime
            dpkg-reconfigure -f noninteractive tzdata

            # 配置 locale
            sed -i '/en_US.UTF-8 UTF-8/s/^# //g' /etc/locale.gen
            locale-gen en_US.UTF-8
            update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8

            # 配置自动更新
            cat > /etc/apt/apt.conf.d/20auto-upgrades \<<'APT_EOF'
            APT::Periodic::Update-Package-Lists "1";
            APT::Periodic::Unattended-Upgrade "1";
            APT_EOF

            sed -i 's/.*Unattended-Upgrade::Remove-Unused-Dependencies.*/Unattended-Upgrade::Remove-Unused-Dependencies "true";/' /etc/apt/apt.conf.d/50unattended-upgrades
            sed -i 's/.*Unattended-Upgrade::Remove-Unused-Kernel-Packages.*/Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";/' /etc/apt/apt.conf.d/50unattended-upgrades
            echo 'Unattended-Upgrade::Post-Invoke-Purge "true";' >> /etc/apt/apt.conf.d/50unattended-upgrades

            # 配置 SSH
            sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
            passwd -d root
            sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config

            # 清理和本地化
            rm -rf /usr/share/doc/* /var/cache/apt/* /var/lib/apt/lists/*
            find /usr/share/locale/ -mindepth 1 -maxdepth 1 ! -name 'en*' -exec rm -rf {} +
            cat /etc/passwd && cat /etc/shadow
            rm -f /etc/ssh/ssh_host_*
            apt-get -y autoremove && apt-get -y clean
            CHROOT_SCRIPT
            )"

            for fs in dev sys proc; do sudo umount "$DEBOOT_DIR/$fs" || true; done

      - run:
          name: 创建分区镜像（条件化：MBR 或 GPT）
          command: |
            set -euo pipefail
            source .circleci/scripts/disk-utils.sh
            
            init_env "<< parameters.debian_release >>" "<< parameters.boot_mode >>"
            IMG_SIZE=1G
            
            # 创建磁盘镜像
            sudo rm -f "$IMG_FILE"
            sudo fallocate -l "$IMG_SIZE" "$IMG_FILE"

            # 分区布局
            if [ "$BOOT_MODE" = "bios-uefi" ]; then
              sudo parted --script "$IMG_FILE" \
                mklabel gpt \
                mkpart primary 1MiB 2MiB \
                name 1 bios_grub \
                set 1 bios_grub on \
                mkpart ESP fat32 2MiB 35MiB \
                set 2 boot on \
                name 2 efi \
                mkpart primary 35MiB 100% \
                name 3 root
            else
              echo ",,83" | sudo sfdisk --label dos "$IMG_FILE"
            fi

            # 挂载循环设备
            setup_loop_device "$IMG_FILE"
            resolve_boot_devices || error_cleanup "$LOOP_DEV"

            # 格式化分区
            has_valid_efi_dev && sudo mkfs.vfat -F32 -n EFI "$EFI_DEV"
            sudo mkfs.btrfs $BTRFS_MKFS_OPTS -L "debian_${RELEASE}_btrfs" "$ROOT_DEV"

            # 创建 btrfs 子卷
            sudo mkdir -p "$MOUNT_DIR"
            sudo mount -o loop,compress=zstd:9,noatime "$ROOT_DEV" "$MOUNT_DIR"
            sudo btrfs subvolume create "$MOUNT_DIR/@" || true
            umount_root_filesystem "$MOUNT_DIR"

            # 清理
            cleanup_loop_device "$LOOP_DEV"

      - run:
          name: 复制系统文件和配置
          command: |
            set -euo pipefail
            source .circleci/scripts/disk-utils.sh
            
            DEBOOT_DIR=/tmp/debootstrap-root
            init_and_setup_loop "<< parameters.debian_release >>" "<< parameters.boot_mode >>" || \
              error_cleanup "$LOOP_DEV"

            # 挂载根分区
            mount_root_filesystem "$MOUNT_DIR"

            # 复制系统文件
            sudo rsync -aHAX --numeric-ids --sparse --delete "$DEBOOT_DIR"/ "$MOUNT_DIR"/

            # 配置云初始化
            sudo truncate -s 0 "$MOUNT_DIR/etc/machine-id" || true
            sudo rm -f "$MOUNT_DIR/var/lib/dbus/machine-id" || true
            cat \<<EOF | sudo tee "$MOUNT_DIR/etc/cloud/cloud.cfg.d/99-custom.cfg" > /dev/null
            datasource_list: [ AliYun, ConfigDrive, None ]
            manage_etc_hosts: true
            disable_root: false
            preserve_hostname: false
            system_info:
              default_user:
                name: root
              network:
                renderers: ['eni']
            EOF

            sudo chroot "$MOUNT_DIR" /bin/bash -c "cloud-init clean --logs --seed" || true

            # 配置 fstab
            NEW_UUID=$(sudo blkid -s UUID -o value "$ROOT_DEV")
            echo "UUID=$NEW_UUID / btrfs $BTRFS_MOUNT_OPTS 0 0" | \
              sudo tee "$MOUNT_DIR/etc/fstab" > /dev/null

            if has_valid_efi_dev; then
              ESP_UUID=$(sudo blkid -s UUID -o value "$EFI_DEV" || echo "")
              [ -n "$ESP_UUID" ] && echo "UUID=$ESP_UUID /boot/efi vfat defaults,umask=0077 0 1" | \
                sudo tee -a "$MOUNT_DIR/etc/fstab" > /dev/null
            fi

            sudo cat "$MOUNT_DIR/etc/fstab"

            # 清理日志和缓存
            sudo rm -rf "$MOUNT_DIR/var/log/"* "$MOUNT_DIR/var/cache/"* "$MOUNT_DIR/tmp/"* || true
            sudo rm -f "$MOUNT_DIR/usr/sbin/policy-rc.d" || true

            # 卸载文件系统
            cleanup_all "$LOOP_DEV" "$MOUNT_DIR"

      - run:
          name: 安装 GRUB 引导
          command: |
            set -euo pipefail
            source .circleci/scripts/disk-utils.sh
            
            init_and_setup_loop "<< parameters.debian_release >>" "<< parameters.boot_mode >>" || \
              error_cleanup "$LOOP_DEV"

            # 挂载文件系统
            mount_root_filesystem "$MOUNT_DIR"
            mount_efi_filesystem "$MOUNT_DIR"
            mount_virtual_filesystems "$MOUNT_DIR"
            sudo cp /etc/resolv.conf "$MOUNT_DIR/etc/resolv.conf" || true
            sudo mkdir -p "$MOUNT_DIR/boot"

            # 安装 GRUB
            if sudo chroot "$MOUNT_DIR" /bin/bash -c "command -v grub-install >/dev/null 2>&1"; then
              if [ "$BOOT_MODE" = "bios-uefi" ]; then
                sudo chroot "$MOUNT_DIR" /bin/bash -c \
                  "grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=debian --removable --recheck || true; \
                   grub-install --target=i386-pc --recheck --boot-directory=/boot /dev/loop0 || true; \
                   update-grub || true"
              else
                sudo chroot "$MOUNT_DIR" /bin/bash -c \
                  "grub-install --target=i386-pc --recheck --boot-directory=/boot /dev/loop0; \
                   update-grub || true"
              fi
            else
              echo "grub-install 不可用" >&2
              error_cleanup "$LOOP_DEV" "$MOUNT_DIR"
            fi

            # 清理
            cleanup_all "$LOOP_DEV" "$MOUNT_DIR"
            sudo rmdir "$MOUNT_DIR" || true

      - run:
          name: 转换为 qcow2 并生成最终文件名
          command: |
            set -euo pipefail
            RELEASE=${RELEASE:-<< parameters.debian_release >>}
            BOOT_MODE=<< parameters.boot_mode >>
            IMG_FILE="debian-${RELEASE}-btrfs.img"
            QCOW2_TMP="debian-${RELEASE}-btrfs.tmp.qcow2"
            SUFFIX=$([ "$BOOT_MODE" = "bios-uefi" ] && echo "bios-uefi" || echo "bios")
            qemu-img convert -p -O qcow2 -c -o cluster_size=512k "$IMG_FILE" "$QCOW2_TMP"
            SHA256=$(sha256sum "$QCOW2_TMP" | awk '{print $1}' | cut -c1-8)
            QCOW2_FINAL="debian-${RELEASE}-btrfs-${SUFFIX}-${SHA256}.qcow2"
            mv -f "$QCOW2_TMP" "$QCOW2_FINAL"
            QCOW2_LATEST="debian-${RELEASE}-btrfs-${SUFFIX}-latest.qcow2"
            ln -f "$QCOW2_FINAL" "$QCOW2_LATEST"
            ls -lh "$QCOW2_FINAL" "$QCOW2_LATEST"
            qemu-img info "$QCOW2_FINAL"

      - run:
          name: 上传到 GitHub Release
          command: |
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive APT_LISTCHANGES_FRONTEND=none
            type -p curl >/dev/null || sudo apt install -y curl
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
              sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && \
              sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg && \
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | \
              sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null && \
              sudo apt update && sudo apt install -y gh

            RELEASE=<< parameters.debian_release >>
            BOOT_MODE=<< parameters.boot_mode >>
            SUFFIX=$([ "$BOOT_MODE" = "bios-uefi" ] && echo "bios-uefi" || echo "bios")
            : "${GH_TOKEN:?GH_TOKEN is required}"
            export GITHUB_TOKEN=$GH_TOKEN
            TAG_NAME="${CIRCLE_TAG:-manual-$(date +%s)}"

            shopt -s nullglob
            SHA_FILES=(debian-${RELEASE}-btrfs-${SUFFIX}-*.qcow2)
            shopt -u nullglob
            LATEST_FILE="debian-${RELEASE}-btrfs-${SUFFIX}-latest.qcow2"

            [ ${#SHA_FILES[@]} -gt 0 ] || { echo "未找到 qcow2 文件" >&2; exit 1; }
            [ "$BOOT_MODE" = "bios-uefi" ] && sleep $((RANDOM % 5 + 5))
            if ! gh release view "$TAG_NAME" > /dev/null 2>&1; then
              gh release create "$TAG_NAME" --title "Debian Btrfs Cloud Image $TAG_NAME" --notes "自动发布 Debian ${RELEASE} Btrfs 镜像"
            fi

            for f in "${SHA_FILES[@]}"; do
              [ -f "$f" ] && gh release upload "$TAG_NAME" "$f" --clobber || true
            done
            [ -f "$LATEST_FILE" ] && gh release upload "$TAG_NAME" "$LATEST_FILE" --clobber || true
            gh release edit "$TAG_NAME" --latest
            sudo rm -f /usr/sbin/policy-rc.d || true

  upload-to-aliyun:
    machine:
      image: ubuntu-2204:current
      resource_class: medium
    steps:
      - checkout

      - run:
          name: 安装依赖工具
          command: |
            set -euo pipefail
            sudo apt-get update && sudo apt-get install -y curl tar jq ca-certificates
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update && sudo apt-get install -y gh
            curl -sSL https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz -o /tmp/aliyun-cli.tgz
            tar -xzf /tmp/aliyun-cli.tgz -C /tmp && sudo mv /tmp/aliyun /usr/local/bin/aliyun && sudo chmod +x /usr/local/bin/aliyun

      - run:
          name: 从 GitHub Release 下载镜像
          command: |
            set -euo pipefail
            export GITHUB_TOKEN=${GH_TOKEN}
            mkdir -p /tmp/artifacts
            LATEST_TAG=$(gh release view --json tagName -q .tagName)
            echo "Latest tag: $LATEST_TAG"
            gh release view "$LATEST_TAG" --json assets | jq -r '.assets[].name | select(endswith(".qcow2") and (endswith("latest.qcow2") | not))' | while read -r NAME; do
              echo "Downloading: $NAME"
              gh release download "$LATEST_TAG" --pattern "$NAME" --dir /tmp/artifacts
            done
            ls -lah /tmp/artifacts

      - run:
          name: 配置阿里云 CLI 并上传到 OSS
          command: |
            set -euo pipefail
            REGION="${OSS_REGION:-${ALIYUN_REGION:-}}"
            sudo aliyun configure set --profile default --region "${REGION}" --access-key-id "${ALIYUN_ACCESS_KEY_ID}" --access-key-secret "${ALIYUN_ACCESS_KEY_SECRET}"
            BUCKET="${OSS_BUCKET}"; PREFIX="${OSS_PATH:-releases}"
            COUNT=0
            for f in /tmp/artifacts/*.qcow2; do
              [ -f "$f" ] || continue
              BASENAME=$(basename "$f")
              echo "Uploading: ${BASENAME}"
              sudo aliyun oss cp "$f" "oss://${BUCKET}/${PREFIX}/${BASENAME}" --region "${REGION}" --force
              ((++COUNT))
            done
            echo "上传完成: ${COUNT} 个文件"

      - run:
          name: 并行导入镜像并轮询状态，完成后删除OSS文件
          command: |
            set -euo pipefail
            REGION="${OSS_REGION}"; BUCKET="${OSS_BUCKET}"; PREFIX="${OSS_PATH:-releases}"
            [ "${BASH_VERSINFO:-0}" -lt 4 ] && { echo "Error: Bash 4.0+ required."; exit 1; }
            declare -A TASK_MAP; declare -A TASK_STATUS; ERROR_COUNT=0
            echo "=== Phase 1: 启动导入任务 ==="
            for f in /tmp/artifacts/*.qcow2; do
              [ -f "$f" ] || continue
              BASENAME=$(basename "$f")
              IMAGE_NAME="${BASENAME%.*}-$(date +%Y%m%d-%H%M%S)"
              OSS_OBJ="${PREFIX}/${BASENAME}"
              BOOT_MODE="BIOS"; [[ "$BASENAME" =~ bios-uefi ]] && BOOT_MODE="UEFI"
              echo "触发导入: ${IMAGE_NAME}..."
              IMPORT_OUT=$(sudo aliyun ecs ImportImage --RegionId "${REGION}" --ImageName "${IMAGE_NAME}" --Architecture "x86_64" --OSType "linux" --Platform "Debian" --BootMode "${BOOT_MODE}" --DiskDeviceMapping.1.OSSBucket "${BUCKET}" --DiskDeviceMapping.1.OSSObject "${OSS_OBJ}" 2>&1) || { echo "API失败: $IMPORT_OUT"; ERROR_COUNT=$((ERROR_COUNT + 1)); continue; }
              TASK_ID=$(echo "$IMPORT_OUT" | jq -r '.TaskId // empty' 2>/dev/null || true)
              [ -z "$TASK_ID" ] && TASK_ID=$(echo "$IMPORT_OUT" | grep -oE 't-[A-Za-z0-9]+' | head -n 1)
              if [ -n "$TASK_ID" ]; then
                TASK_MAP["$TASK_ID"]="$OSS_OBJ"; TASK_STATUS["$TASK_ID"]="Importing"
              else
                echo "TaskId获取失败: $IMPORT_OUT"; ERROR_COUNT=$((ERROR_COUNT + 1))
              fi
            done
            [ ${#TASK_MAP[@]} -gt 0 ] || exit $ERROR_COUNT
            echo "=== Phase 2: 轮询状态 (30s间隔) ==="
            MAX_ITER=120; iter=0
            while [ $iter -lt $MAX_ITER ]; do
              sleep 30; iter=$((iter + 1)); FINISHED_IN_LOOP=0
              for TASK_ID in "${!TASK_MAP[@]}"; do
                if [[ "${TASK_STATUS[$TASK_ID]}" =~ ^(Finished|Failed|Cancelled|Closed)$ ]]; then
                  FINISHED_IN_LOOP=$((FINISHED_IN_LOOP + 1)); continue
                fi
                STATUS_JSON=$(sudo aliyun ecs DescribeTaskAttribute --RegionId "${REGION}" --TaskId "${TASK_ID}" 2>/dev/null || echo "{}")
                NEW_STATUS=$(echo "$STATUS_JSON" | jq -r '.TaskStatus // empty')
                [ -z "$NEW_STATUS" ] && NEW_STATUS=$(echo "$STATUS_JSON" | jq -r '..|.TaskStatus? // empty' | head -n 1)
                TASK_STATUS["$TASK_ID"]="${NEW_STATUS:-Waiting}"
                echo "Task $TASK_ID: ${TASK_STATUS[$TASK_ID]} [$iter/$MAX_ITER]"
                case "${TASK_STATUS[$TASK_ID]}" in
                  "Finished")
                    echo "Task $TASK_ID 成功，清理 OSS..."
                    sudo aliyun oss rm "oss://${BUCKET}/${TASK_MAP[$TASK_ID]}" --region "${REGION}" --force || true
                    TASK_STATUS["$TASK_ID"]="Finished"; FINISHED_IN_LOOP=$((FINISHED_IN_LOOP + 1))
                    ;;
                  "Failed"|"Cancelled"|"Closed")
                    echo "Task $TASK_ID 异常终止: ${TASK_STATUS[$TASK_ID]}"
                    ERROR_COUNT=$((ERROR_COUNT + 1)); TASK_STATUS["$TASK_ID"]="Failed"; FINISHED_IN_LOOP=$((FINISHED_IN_LOOP + 1))
                    ;;
                esac
              done
              [ $FINISHED_IN_LOOP -eq ${#TASK_MAP[@]} ] && { echo "所有任务已完成。"; break; }
            done
            [ $iter -ge $MAX_ITER ] && { echo "轮询超时，部分任务未完成。"; exit 1; }
            [ $ERROR_COUNT -gt 0 ] && { echo "同步过程中存在 $ERROR_COUNT 个失败任务。"; exit 1; }
            echo "所有镜像导入任务已成功完成！"

workflows:
  debian-btrfs_build_and_release:
    jobs:
      - build-debian-btrfs-image:
          name: "build-debian-btrfs-bios"
          boot_mode: "bios"
          debian_release: << pipeline.parameters.debian_release >>
          filters: &tag_filters
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build-debian-btrfs-image:
          name: "build-debian-btrfs-bios-uefi"
          boot_mode: "bios-uefi"
          debian_release: << pipeline.parameters.debian_release >>
          filters: *tag_filters
      - upload-to-aliyun:
          filters:
            tags:
              only: /^upload-aliyun-.*$/
            branches:
              ignore: /.*/
